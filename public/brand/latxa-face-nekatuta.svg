<svg xmlns="http://www.w3.org/2000/svg" viewBox="90 75 220 220" width="100%" height="100%">
  <!-- Face-only crop of latxa-expression-nekatuta.svg (Nekatuta/tired) —
       same crop rationale as latxa-face-pozik.svg. The full illustration's
       "Z" sleep marks (upper right, outside this viewBox) don't survive a
       circular avatar crop regardless of viewBox width — tested both the
       standard 220x220 crop and a wider 260x260 one, the Z's stay clipped
       by the circle mask either way. The droopy eyes/downturned eyebrows
       alone still read clearly as tired, so cropped to match the other two
       faces instead of using a one-off wider box for a detail that doesn't
       show up regardless. -->
  <path d="M 130,155 C 85,145 55,175 65,205 C 70,220 95,205 125,180 Z" fill="#1E2530" />
  <path d="M 270,155 C 315,145 345,175 335,205 C 330,220 305,205 275,180 Z" fill="#1E2530" />
  <path d="M 135,165 C 135,105 265,105 265,165 C 265,220 240,270 200,270 C 160,270 135,220 135,165 Z" fill="#1E2530" />
  <path d="M 154,162 L 190,162 A 18,18 0 0,1 154,162 Z" fill="#FFFFFF" />
  <circle cx="172" cy="170" r="5" fill="#0B0F19" />
  <path d="M 210,162 L 246,162 A 18,18 0 0,1 210,162 Z" fill="#FFFFFF" />
  <circle cx="228" cy="170" r="5" fill="#0B0F19" />
  <path d="M 138,140 C 145,105 255,105 262,140 L 245,155 L 230,140 L 200,165 L 170,140 L 155,155 Z" fill="#F8FAFC" stroke="#94A3B8" stroke-width="3" stroke-linejoin="round" />
  <path d="M 152,138 L 182,135" fill="none" stroke="#1E2530" stroke-width="4" stroke-linecap="round" />
  <path d="M 248,138 L 218,135" fill="none" stroke="#1E2530" stroke-width="4" stroke-linecap="round" />
  <path d="M 190,220 L 210,220 C 215,220 213,228 200,231 C 187,228 185,220 190,220 Z" fill="#0B0F19" />
  <line x1="188" y1="240" x2="212" y2="240" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" />
</svg>

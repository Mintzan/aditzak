name = "aditzak-sync"
main = "src/index.js"
compatibility_date = "2024-11-01"

# Non-secret configuration. Override per-environment with `wrangler.toml`
# environments or `wrangler deploy --var KEY:value` if needed.
[vars]
# Origin allowed to call this worker (no trailing slash).
ALLOWED_ORIGIN = "https://mintzan.github.io"
# Base URL of the deployed app, used as the magic-link redirect target
# (the worker appends `?authToken=<token>`).
APP_URL = "https://mintzan.github.io/aditzak/"
# Resend "from" address for sign-in emails. Must be on a domain verified in
# Resend, or "onboarding@resend.dev" for testing (see
# docs/CLOUDFLARE_FEEDBACK_WORKER.md).
AUTH_FROM_EMAIL = "login@mintzan.dpdns.org"

# D1 database used for users/sessions/magic links/progress snapshots. The
# `database_id` below is a placeholder — replace it with the id printed by
# `wrangler d1 create aditzak-sync` (see docs/CLOUDFLARE_SYNC_WORKER.md).
[[d1_databases]]
binding = "DB"
database_name = "aditzak-sync"
database_id = "1399fdb1-a3a1-4871-87d5-4d21951eb1bc"
migrations_dir = "migrations"

# Set with: wrangler secret put RESEND_API_KEY
# RESEND_API_KEY
